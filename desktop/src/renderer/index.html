<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Facebook Group Connector</title>
    <style>
      html,
      body,
      #root {
        min-height: 100%;
      }

      body {
        margin: 0;
        background: #070a12;
      }

      .preload-shell {
        display: grid;
        min-height: 100vh;
        place-items: center;
        color: #f4f7ff;
        background:
          radial-gradient(circle at 50% 38%, rgba(116, 168, 255, 0.25), transparent 26rem),
          linear-gradient(145deg, #070a12 0%, #0d1425 100%);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .preload-card {
        text-align: center;
      }

      .preload-mark {
        width: 68px;
        height: 68px;
        margin: 0 auto 18px;
        border-radius: 22px;
        background: linear-gradient(135deg, #74a8ff, #63e6be);
        box-shadow: 0 0 70px rgba(116, 168, 255, 0.32);
        transform: rotate(45deg);
      }

      .preload-card p {
        margin: 0;
        color: #99a7c3;
        font-size: 0.92rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="root">
      <main class="preload-shell" aria-label="Loading Facebook Connector">
        <div class="preload-card">
          <div class="preload-mark" aria-hidden="true"></div>
          <p>Launching connector</p>
        </div>
      </main>
    </div>
    <script type="module" src="/main.tsx"></script>
  </body>
</html>
