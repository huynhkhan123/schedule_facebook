version: desktop-{build}

image: Visual Studio 2022

skip_non_tags: true

branches:
  only:
    - main

environment:
  CSC_IDENTITY_AUTO_DISCOVERY: false
  PYTHON_VERSION: "3.12"

install:
  - cmd: powershell -NoProfile -ExecutionPolicy Bypass -Command "irm https://astral.sh/uv/install.ps1 | iex"
  - cmd: set "PATH=%USERPROFILE%\.local\bin;%PATH%" && uv --version
  - cmd: node --version
  - cmd: npm --version
  - cmd: set "PATH=%USERPROFILE%\.local\bin;%PATH%" && uv python install %PYTHON_VERSION%
  - cmd: set "PATH=%USERPROFILE%\.local\bin;%PATH%" && uv sync --all-groups --frozen
  - cmd: cd desktop && npm ci

build_script:
  - ps: |
      $ErrorActionPreference = "Stop"
      uv run pytest tests/unit/test_connector_core.py tests/unit/test_connector_sidecar.py -v
  - ps: |
      $ErrorActionPreference = "Stop"
      Set-Location desktop
      npm run typecheck
      Set-Location ..
  - ps: |
      $ErrorActionPreference = "Stop"
      .\scripts\build-sidecar.ps1
  - ps: |
      $ErrorActionPreference = "Stop"
      Set-Location desktop
      npm run dist:win -- --publish never
      Set-Location ..

test: off

artifacts:
  - path: dist\desktop\*.exe
    name: facebook-group-connector-windows-installer
  - path: dist\desktop\*.exe.blockmap
    name: facebook-group-connector-windows-blockmap
  - path: dist\desktop\latest.yml
    name: facebook-group-connector-windows-update-metadata

deploy_script:
  - ps: |
      $ErrorActionPreference = "Stop"
      if ($env:APPVEYOR_REPO_TAG -ne "true") {
        Write-Host "Not a tag build; skipping GitHub Release upload."
        return
      }
      if ([string]::IsNullOrWhiteSpace($env:GH_TOKEN)) {
        throw "GH_TOKEN is missing. Add it in AppVeyor Project Settings > Environment."
      }

      $repo = $env:APPVEYOR_REPO_NAME
      $tag = $env:APPVEYOR_REPO_TAG_NAME
      $version = node -p "require('./desktop/package.json').version"
      $expectedTag = "desktop-v$version"
      if ($tag -ne $expectedTag) {
        throw "Tag $tag does not match desktop/package.json version $version. Expected $expectedTag."
      }

      $headers = @{
        Authorization = "Bearer $env:GH_TOKEN"
        Accept = "application/vnd.github+json"
        "X-GitHub-Api-Version" = "2022-11-28"
        "User-Agent" = "appveyor-facebook-group-connector-release"
      }
      $apiBase = "https://api.github.com/repos/$repo"

      function Invoke-GitHubJson {
        param(
          [string]$Method,
          [string]$Uri,
          [object]$Body = $null
        )

        $parameters = @{
          Method = $Method
          Uri = $Uri
          Headers = $headers
        }
        if ($null -ne $Body) {
          $parameters.ContentType = "application/json"
          $parameters.Body = ($Body | ConvertTo-Json -Depth 10)
        }
        return Invoke-RestMethod @parameters
      }

      function Get-GitHubRelease {
        param([string]$ReleaseTag)

        try {
          return Invoke-GitHubJson -Method Get -Uri "$apiBase/releases/tags/$ReleaseTag"
        } catch {
          if ($_.Exception.Response.StatusCode.value__ -eq 404) {
            return $null
          }
          throw
        }
      }

      $release = Get-GitHubRelease -ReleaseTag $tag
      if ($null -eq $release) {
        Write-Host "Creating GitHub Release $tag..."
        $release = Invoke-GitHubJson -Method Post -Uri "$apiBase/releases" -Body @{
          tag_name = $tag
          name = "Facebook Group Connector $version"
          body = "Windows unsigned test release $version. Customers may see Windows SmartScreen / Unknown Publisher warnings."
          draft = $false
          prerelease = $false
        }
      } else {
        Write-Host "GitHub Release $tag already exists; assets will be replaced."
      }

      $assets = @()
      $assets += Get-ChildItem -Path "dist\desktop" -Filter "*.exe" -File
      $assets += Get-ChildItem -Path "dist\desktop" -Filter "*.exe.blockmap" -File
      $latestYml = Join-Path "dist\desktop" "latest.yml"
      if (Test-Path $latestYml) {
        $assets += Get-Item $latestYml
      }
      if ($assets.Count -eq 0) {
        throw "No release assets found in dist\desktop."
      }
      if (-not (Test-Path $latestYml)) {
        throw "Missing latest.yml. electron-updater requires this metadata file."
      }

      $uploadBase = $release.upload_url -replace "\{\?name,label\}", ""
      foreach ($asset in $assets) {
        $existingAsset = $release.assets | Where-Object { $_.name -eq $asset.Name } | Select-Object -First 1
        if ($null -ne $existingAsset) {
          Write-Host "Deleting existing release asset $($asset.Name)..."
          Invoke-GitHubJson -Method Delete -Uri "$apiBase/releases/assets/$($existingAsset.id)" | Out-Null
        }

        $encodedName = [System.Uri]::EscapeDataString($asset.Name)
        $uploadUri = "${uploadBase}?name=$encodedName"
        Write-Host "Uploading $($asset.Name)..."
        Invoke-WebRequest `
          -Method Post `
          -Uri $uploadUri `
          -Headers $headers `
          -ContentType "application/octet-stream" `
          -InFile $asset.FullName `
          -UseBasicParsing | Out-Null
      }

      Write-Host "Uploaded Windows desktop release assets to https://github.com/$repo/releases/tag/$tag"
